{{- $datavol := trim .DataVolume }}
{{- $homevol := trim .HomeVolume }}
{{- $ingressurl := trim .IngressURL | stripPrefix "file:///" }}
{{- $ingresspath := trim .IngressPath }}
{{- $s3_secret := trim .S3Secret }}
{{- if and $datavol (not (hasPrefix "volume://" $datavol)) }}
  {{- fail (printf "DataVolume must start with 'volume://', got %q" $datavol) }}
{{- end }}
{{- if and $homevol (not (hasPrefix "volume://" $homevol)) }}
  {{- fail (printf "HomeVolume must start with 'volume://', got %q" $homevol) }}
{{- end }}
{{- if and $ingressurl (not $datavol) }}
  {{- fail "IngressURL requires DataVolume to be set" }}
{{- end }}
{{- if and $ingressurl (not $ingresspath) }}
  {{- fail "IngressPath is required when IngressURL is set" }}
{{- end }}
{{- if and (hasPrefix "s3://" $ingressurl) (not $s3_secret) }}
  {{- fail "S3Secret is required when IngressURL uses an s3:// prefix" }}
{{- end }}

{{- $datamount := "/data" }}
{{- $home := "/home/fb" }}
{{- if not $homevol }}
  {{ $home = "/tmp/homefb" }}
{{- end }}
{{- $port := randInt 10000 32000 }}

version: v1

{{- if (or $datavol $homevol) }}
volumes:
  {{- if $datavol }}
  data:
    reference: {{ $datavol }}
    {{- if $ingressurl }}
    ingress:
      - source:
          uri: {{ $ingressurl }}
          {{- if $s3_secret }}
          secret: {{ $s3_secret }}
          {{- end }}
        destination:
          uri: file:///{{ $ingresspath }}
    {{- end }}
  {{- end }}
  {{- if $homevol }}
  home:
    reference: {{ $homevol }}
  {{- end }}
{{- end }}

services:
  paraview:
{{- if (or $datavol $homevol) }}
    mounts:
  {{- if $datavol }}
      data:
        location: {{ $datamount }}
  {{- end }}
  {{- if $homevol }}
      home:
        location: {{ $home }}
  {{- end }}
{{- end }}
    persist: true
    network:
      ports:
        - name: vnc-port
          protocol: tcp
          port: {{ $port }}
      endpoints:
        - name: paraview
          port-name: vnc-port
          protocol: http
          type: subdomain
          scope: user
    readiness-probe:
      http-get:
        path: /
        port: {{ $port }}
        scheme: HTTP
      initial-delay-seconds: 10
    env:
      - HOME={{ $home }}
    image:
      uri: {{ .Container }}
    script: |
      #!/bin/sh
      echo "Starting ParaView desktop"
      /usr/local/bin/start-vncserver.sh {{ $port }}
    resource:
      cpu:
        cores: {{ .Cores }}
      memory:
        size: {{ .Memory }}
      {{- if gt (.GPUs | int) 0 }}
      devices:
        nvidia.com/gpu: {{ .GPUs }}
      {{- end }}
      exclusive: {{ .Exclusive }}
