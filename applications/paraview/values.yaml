values:
  - name: "Container"
    display_name: "ParaView desktop container to use. Must be compatible with this application."
    string_value: "oras://ghcr.io/ctrliq/ciq-fuzzball-catalog/paraview-paraview:6.0.1-0-amd64"
    display_category: "Container"
  - name: "Cores"
    display_name: "How many CPU cores to allocate."
    uint_value: 8
    display_category: "Resources"
  - name: "Memory"
    display_name: "How much memory to allocate."
    string_value: "32GiB"
    display_category: "Resources"
  - name: "GPUs"
    display_name: "Number of GPUs to allocate. Set to 1 to enable GPU-accelerated rendering via VirtualGL."
    uint_value: 0
    display_category: "Resources"
  - name: "Exclusive"
    display_name: "Disallow other jobs from using the same node/instance."
    bool_value: false
    display_category: "Scheduling"
  - name: "ServiceScope"
    display_name: "Access scope for the ParaView web endpoint (user, group, or organization)."
    string_value: "user"
    display_category: "Network"
  - name: "DataVolume"
    display_name: "Volume to mount at /data for datasets."
    string_value: "volume://user/ephemeral"
    display_category: "Storage"
  - name: "HomeVolume"
    display_name: "Volume to use as your home directory. Leave empty for an ephemeral home."
    string_value: ""
    display_category: "Storage"
