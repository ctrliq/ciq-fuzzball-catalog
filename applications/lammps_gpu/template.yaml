version: v1

{{- $expurl := trim .ExperimentUrl }}
{{- if not $expurl }}
  {{- fail "ExperimentUrl is required" }}
{{- end }}

{{- $stagein := trim .StageinScript }}
{{- if not $stagein }}
  {{- fail "StageinScript is required" }}
{{- end }}
{{- $lammps := trim .LammpsScript }}
{{- if not $lammps }}
  {{- fail "LammpsScript is required" }}
{{- end }}

{{- $scratch_vol := default "volume://user/ephemeral" .ScratchVolume | trim }}
{{- $scratch_mount := "/scratch" }}

{{- $data_vol := trim .DataVolume }}
{{- $data_mount := "/data" }}

{{- $run := trim .RunName }}
{{- if not $run }}
  {{- fail "RunName is required" }}
{{- end }}
{{- $run_dir := printf "%s/%s" $scratch_mount $run }}
{{- $output_path := trim .OutputPath }}
{{- $out_dir := printf "%s/%s" $data_mount $output_path }}

{{- $s3_bucket := trim .S3Bucket }}
{{- $s3_secret := trim .S3Secret }}
{{- if (and $s3_bucket (not $s3_secret)) }}
  {{- fail "S3Secret is required when S3Bucket is set" }}
{{- end }}

{{- $ts := now | unixEpoch }}
{{- $tar_base := list $run $ts | join "-" }}

{{- $gpu_vendor := .GPUVendor | trim | lower }}
{{- if eq $gpu_vendor "nvidia" }}
  {{- $gpu_vendor = "nvidia.com" }}
{{- else if eq $gpu_vendor "amd" }}
  {{- $gpu_vendor = "amd.com" }}
{{- else }}
  {{- fail "Currently supported GPU vendors: NVIDIA and AMD" }}
{{- end }}

defaults:
  job:
    mounts:
      scratch:
        location: "{{ $scratch_mount }}"

volumes:
  scratch:
    reference: {{ $scratch_vol }}
    ingress:
      - destination:
          uri: file://stagein
        source:
          uri: {{ $expurl }}/{{ $stagein }}
      - destination:
          uri: file://run_lammps
        source:
          uri: {{ $expurl }}/{{ $lammps }}
{{- if $s3_bucket }}
    egress:
      - source:
          uri: file://{{ $tar_base }}.tar.gz
        destination:
          uri: s3://{{ $s3_bucket }}/{{ $output_path }}/{{ $tar_base }}.tar.gz
          secret: {{ $s3_secret }}
{{- end }}
{{- if $data_vol }}
  data:
    reference: {{ $data_vol }}
{{- end }}

jobs:
  stagein:
    script: |
      #!/bin/sh
      set -e
      chmod +x "{{ $scratch_mount }}/stagein"
      "{{ $scratch_mount }}/stagein" "{{ $run_dir }}"
    image:
      uri: docker://alpine:3.23.3
    resource:
      cpu:
        cores: 1
      memory:
        size: 512MiB

  lammps:
    image:
      uri: {{.LammpsContainerUri}}
    depends-on:
      - name: stagein
        status: FINISHED
    script: |
      #!/bin/sh
      set -e
      chmod +x "{{ $scratch_mount }}/run_lammps"
      "{{ $scratch_mount }}/run_lammps" "{{ $run_dir }}" {{.GPUs}}
    resource:
      cpu:
        cores: {{.Cores}}
        affinity: NUMA
      memory:
        size: {{.Memory}}
      devices:
        {{ $gpu_vendor }}/gpu: {{.GPUs}}
{{- if (trim .GPUModel) }}
      annotations:
        {{ $gpu_vendor }}/gpu.model: {{.GPUModel}}
{{- end }}
    multinode:
      implementation: {{.MpiFlavor}}
      nodes: {{.Nodes}}
    policy:
      timeout:
        execute: {{.Timeout}}

{{- if (or $s3_bucket $data_vol) }}
  stageout:
    script: |
      #!/bin/sh
      set -e
      echo "${FB_WORKFLOW_ID}" > "{{ $run_dir }}/FB_WORKFLOW_ID"
      cd "{{ $scratch_mount }}"
      tar -czf "{{ $tar_base }}.tar.gz" "{{ $run }}"
{{- if $data_vol }}
      mkdir -p "{{ $out_dir }}"
      cp "{{ $tar_base }}.tar.gz" "{{ $out_dir }}/{{ $tar_base }}.tar.gz"
{{- end }}
    image:
      uri: docker://alpine:3.23.3
{{- if $data_vol }}
    mounts:
      data:
        location: {{ $data_mount }}
{{- end }}
    depends-on:
      - name: lammps
        status: FINISHED
    resource:
      cpu:
        cores: 1
      memory:
        size: 512MiB
{{- end }}
