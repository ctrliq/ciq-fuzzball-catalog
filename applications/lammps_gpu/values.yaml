values:
  - name: ScratchVolume
    display_name: Ephemeral scratch volume used during the LAMMPS run.
    string_value: "volume://user/ephemeral"
    display_category: Storage
  - name: DataVolume
    display_name: Persistent volume to store results. If set, a tar archive of the run directory is copied here.
    string_value: ""
    display_category: Storage
  - name: S3Bucket
    display_name: S3 bucket name for result egress. If set, a tar archive is uploaded via Fuzzball volume egress.
    string_value: ""
    display_category: Storage
  - name: S3Secret
    display_name: Fuzzball secret name with S3 credentials. Required when S3Bucket is set or ExperimentUrl uses S3.
    string_value: ""
    display_category: Storage

  - name: ExperimentUrl
    display_name: >-
      Base URL where workflow scripts (stagein, lammps) can be found. Supports https:// and s3:// URLs. The experiment files
      are expected in <ExperimentUrl/RunName>.
    string_value: "https://raw.githubusercontent.com/ctrliq/ciq-fuzzball-catalog/refs/heads/main/applications/lammps_gpu/experiments"
    display_category: Parameters
  - name: StageinScript
    display_name: >-
      Path of a script relative to ExperimentUrl/RunName that sets up a lammps run including a lammps input file. It takes the
      path of the lammps run directory as an argument and creates files necessary for the LammpsScript.
    string_value: stagein.sh
    display_category: Parameters
  - name: LammpsScript
    display_name: >-
      Path of a script relative to ExperimentUrl/RunName that executes lammps on the input generated by the stagein script. It takes the
      path of the lammps run directory and the number of GPUs per node as arguments.
    string_value: lammps.sh
    display_category: Parameters
  - name: RunName
    display_name: >-
      Name of the run directory in the ephemeral scratch volume. Also used as a prefix for the output tar archive name along with
      a time stamp and the path relative to the ExperimentUrl where the experiment scripts are located. Examples included here
      are lj-simple, lj-improved, cnt-unbreakable, cnt-breakable available at the default Experiment Url.
    string_value: lj-simple
    display_category: Parameters
  - name: OutputPath
    display_name: >-
      Path used for result storage. For persistent volumes, this is relative to the volume root. For S3, this is the
      key prefix within the bucket.
    string_value: "results/lammps_gpu"
    display_category: Parameters

  - name: LammpsContainerUri
    display_name: >-
      URI of LAMMPS container that will be used for computation. This workflow assumes that
      LAMMPS is installed in /usr/local/lammps/<GPU capability> as is the case for the NVCR
      based containers.
    string_value: "docker://nvcr.io/nvidia/lammps:10Sep25_pytorch"
    display_category: Container

  - name: Cores
    display_name: How many CPU cores to allocate per node.
    uint_value: 2
    display_category: Resources
  - name: Memory
    display_name: How much memory to allocate per node.
    string_value: 14GiB
    display_category: Resources
  - name: GPUVendor
    display_name: GPU vendor (nvidia or amd). Container must support the chosen GPU vendor.
    string_value: nvidia
    display_category: Resources
  - name: GPUs
    display_name: How many GPUs to allocate per node.
    uint_value: 1
    display_category: Resources
  - name: GPUModel
    display_name: What type of GPU to allocate.
    display_category: Resources
    string_value: T4
  - name: Nodes
    display_name: How many Nodes to allocate.
    uint_value: 1
    display_category: Resources
  - name: MpiFlavor
    display_name: "MPI flavor. Options: openmpi, mpich. The NVCR container uses OpenMPI."
    string_value: openmpi
    display_category: Resources

  - name: Timeout
    display_name: Maximum runtime.
    string_value: 30m
    display_category: Execution
