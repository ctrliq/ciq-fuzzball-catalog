values:
  - name: ScratchVolume
    display_name: Used during LAMMPS run
    string_value: "volume://user/ephemeral"
    display_category: Storage
  - name: DataVolume
    display_name: Persistent volume to store data. Required if saving to a persistent volume with a stageout script.
    string_value: ""
    display_category: Storage

  - name: ExperimentUrl
    display_name: >-
      Base URL where workflow scripts can be found. The stagein script is required. The stageout is optional.
    string_value: "https://raw.githubusercontent.com/ctrliq/ciq-fuzzball-catalog/refs/heads/FUZZ-4937-lammps-gpu-fix/applications/lammps_gpu/experiments/lennard-jones-fluid/my-first-input"
    display_category: Parameters
  - name: StageinScript
    display_name: >-
      Path of a script relative to the ExperimentUrl that sets up a lammps run including a lammps input file. It takes the
      name of the lammps run used to name the output as argument and assumes that it creates a main lammps input file called
      'input.lammps'.
    string_value: stagein.sh
    display_category: Parameters
  - name: LammpsScript
    display_name: >-
      Path of a script relative to the ExperimentUrl that executes lammps on the input generated by the stagein script. It takes the
      name of the lammps run directory as an argument.
    string_value: lammps.sh
    display_category: Parameters
  - name: StageoutScript
    display_name: >-
      Path of a script relative to the ExperimentUrl that copies output data to S3 or some other location. It takes the
      full path to the run directory and a fully expanded destination directory (including OutputPath and RunName) as
      arguments. If no script is provided results will not be persisted.
    string_value: ""
    display_category: Parameters
  - name: RunName
    display_name: >-
      Name of the run directory in the ephemeral scratch volume. Also used to compose the output file name
      along with the workflow id.
    string_value: lammps-test
    display_category: Parameters
  - name: OutputPath
    display_name: >-
      Path relative to the root of the data volume where results should be written to. Ignored if no stageout script is
      provided.
    string_value: "results/lammps_gpu"
    display_category: Parameters

  - name: LammpsContainerUri
    display_name: >-
      URI of LAMMPS container that will be used for computation. This workflow assumes that
      LAMMPS is installed in /usr/local/lammps/<GPU capability> as is the case for the NVCR
      based containers.
    string_value: "docker://nvcr.io/nvidia/lammps:10Sep25_pytorch"
    display_category: Container

  - name: Cores
    display_name: How many CPU cores to allocate per node.
    uint_value: 2
    display_category: Resources
  - name: Memory
    display_name: How much memory to allocate per node.
    string_value: 14GiB
    display_category: Resources
  - name: GPUVendor
    display_name: GPU vendor (nvidia or amd). Container must support the chosen GPU vendor.
    string_value: nvidia
    display_category: Resources
  - name: GPUs
    display_name: How many GPUs to allocate per node.
    uint_value: 1
    display_category: Resources
  - name: GPUModel
    display_name: What type of GPU to allocate.
    display_category: Resources
    string_value: T4
  - name: Nodes
    display_name: How many Nodes to allocate.
    uint_value: 1
    display_category: Resources
  - name: MpiFlavor
    display_name: "MPI flavor. Options: openmpi, mpich. The NVRC container uses OpenMPI."
    string_value: openmpi
    display_category: Resources

  - name: Timeout
    display_name: Maximum runtime.
    string_value: 30m
    display_category: Execution
